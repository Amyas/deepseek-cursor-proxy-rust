name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: deepseek-cursor-proxy-rust
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: deepseek-cursor-proxy-rust
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: deepseek-cursor-proxy-rust.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare archive metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          ARCHIVE_BASENAME="deepseek-cursor-proxy-rust-${VERSION}-${{ matrix.target }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_basename=${ARCHIVE_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" .
          tar -czf "dist/${{ steps.meta.outputs.archive_basename }}.${{ matrix.archive_ext }}" \
            "${{ matrix.binary_name }}" README.md

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" .
          Compress-Archive `
            -Path "${{ matrix.binary_name }}", "README.md" `
            -DestinationPath "dist/${{ steps.meta.outputs.archive_basename }}.${{ matrix.archive_ext }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive_basename }}
          path: dist/*

  release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display release files
        run: find dist -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
